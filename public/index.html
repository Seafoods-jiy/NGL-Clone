<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <title>@jxwv.yzq</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #1a1a1a; color: white;
      font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    /* Loading state shown while we detect the browser */
    #loader {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      background: #1a1a1a;
    }
    #loader .spin {
      width: 42px; height: 42px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #e8176e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 18px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loader .lbl { font-size: 14px; color: #b0b5c3; }

    /* Browser blocker overlay */
    #browserBlocker {
      display: none;
      position: fixed; inset: 0;
      background: #1a1a1a;
      z-index: 99999;
      padding: 40px 20px;
      text-align: center;
    }
    .block-card {
      background: #2b3140;
      padding: 30px;
      border-radius: 22px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
      max-width: 400px;
      margin: 0 auto;
    }
    .block-icon { font-size: 50px; margin-bottom: 15px; }
    .block-title { font-size: 22px; font-weight: 800; margin-bottom: 15px; color: #e8176e; }
    .block-text { font-size: 15px; color: #b0b5c3; line-height: 1.6; margin-bottom: 25px; }

    .instruction-box {
      text-align: left;
      background: rgba(0,0,0,0.2);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 25px;
      border: 1px solid rgba(232, 23, 110, 0.3);
    }
    .step { margin-bottom: 10px; font-size: 13px; display: flex; align-items: center; gap: 10px; }
    .step b { color: #e8176e; }

    .force-btn {
      display: block;
      background: linear-gradient(160deg, #e8176e 0%, #f5853a 100%);
      color: white;
      text-decoration: none;
      padding: 16px;
      border-radius: 50px;
      font-weight: 700;
      transition: transform 0.2s;
    }
    .force-btn:active { transform: scale(0.95); }
  </style>
</head>
<body>

  <!-- Loader while detecting -->
  <div id="loader">
    <div class="spin"></div>
    <div class="lbl">Verifying browser…</div>
  </div>

  <!-- Browser blocker (in-app browser detected) -->
  <div id="browserBlocker">
    <div class="block-card">
      <div class="block-icon">🛡️</div>
      <div class="block-title">Open in External Browser</div>
      <p class="block-text">
        For security, this link must be opened in <b>Chrome</b> or <b>Safari</b>, not inside an app's built-in browser.
      </p>

      <div class="instruction-box" id="instructionBox">
        <div class="step">1. Tap the <b>three dots (•••)</b> or <b>(⋮)</b> icon.</div>
        <div class="step" id="stepTwoText">2. Select <b>"Open in Chrome / Safari"</b>.</div>
      </div>

      <a href="#" id="androidIntentBtn" class="force-btn" style="display: none;">Open in Chrome</a>
    </div>
  </div>

  <script>
    (function () {
      const ua = navigator.userAgent || navigator.vendor || window.opera || '';
      const isInApp = /FBAN|FBAV|Instagram|Messenger|TikTok|Line|Twitter|Snapchat|Pinterest|MicroMessenger|; wv\)/i.test(ua);
      const isAndroid = /Android/i.test(ua);

      if (isInApp) {
        document.getElementById('loader').style.display = 'none';
        const blocker = document.getElementById('browserBlocker');
        blocker.style.display = 'block';

        if (isAndroid) {
          const intentBtn = document.getElementById('androidIntentBtn');
          const stepTwo = document.getElementById('stepTwoText');
          intentBtn.style.display = 'block';
          stepTwo.style.display = 'none';
          const cleanUrl = window.location.href.replace(/https?:\/\//, '').replace(/#.*$/, '');
          // Land on /send.html in the external browser
          const target = cleanUrl.split('/')[0] + '/send.html';
          intentBtn.href = `intent://${target}#Intent;scheme=https;package=com.android.chrome;end`;
        }
        return;
      }

      // External browser confirmed — go straight to send.html
      window.location.replace('send.html');
    })();
  </script>
</body>
</html>
